# =============================================================================
# RETINA - Multi-Stage Visual Anomaly Detection System
# Docker Compose Configuration
# =============================================================================
#
# Architecture Overview:
# ┌─────────────┐      ┌─────────────┐      ┌─────────────┐
# │   Frontend  │◄────►│   Backend   │◄────►│    Redis    │
# │  (Next.js)  │      │ (Rust/Axum) │      │  (Streams)  │
# └─────────────┘      └──────┬──────┘      └──────▲──────┘
#                             │                    │
#                             │ HTTP API           │ Job Queue
#                             │                    │
#                             │              ┌─────┴─────┐
#                             └─────────────►│   Worker  │
#                                            │  (Python) │
#                                            └───────────┘
#
# Communication Patterns:
# - Frontend → Backend: REST API (HTTP)
# - Backend → Redis: Job submission (XADD to streams)
# - Worker ← Redis: Job consumption (XREADGROUP)
# - Worker → Redis: Result storage (HSET)
# - Backend ← Redis: Result retrieval (HGET)
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Persistent Database (Matching Professor's Framework)
  # ---------------------------------------------------------------------------
  # Responsibilities:
  # - User accounts (authentication)
  # - Anomaly records (full lifecycle tracking)
  # - Expert labels and classifications
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: retina-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=retina
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=retina
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retina -d retina"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - retina-network

  # ---------------------------------------------------------------------------
  # Redis - Message Broker & State Store
  # ---------------------------------------------------------------------------
  # Responsibilities:
  # - Inference job queue (Redis Streams)
  # - Result caching (Redis Hashes)
  # - Active learning sample pool (Redis Sorted Sets)
  # - Real-time alerts (Redis Lists)
  # - System state & metrics (Redis Hashes)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: retina-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server 
      --appendonly yes 
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - retina-network

  # ---------------------------------------------------------------------------
  # Backend - API & Orchestration Layer (Rust/Axum)
  # ---------------------------------------------------------------------------
  # Responsibilities:
  # - REST API for frontend communication
  # - Image submission handling
  # - Job scheduling & queuing
  # - Active learning state management
  # - System status aggregation
  #
  # Note: Does NOT run ML models directly - delegates to worker via Redis
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: retina-backend
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://retina:${POSTGRES_PASSWORD}@postgres:5432/retina
      - JWT_SECRET=${JWT_SECRET}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=3001
      - RUST_LOG=info,tower_http=debug,retina_backend=debug
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - image-data:/data/images
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - retina-network

  # ---------------------------------------------------------------------------
  # ML Worker - Inference Engine (Python)
  # ---------------------------------------------------------------------------
  # Responsibilities:
  # - Consume inference jobs from Redis queue
  # - Run anomaly detection models (PatchCore, PaDiM, WinCLIP stubs)
  # - Store results back to Redis
  # - Handle model loading & caching
  #
  # Research Status:
  # - Currently using deterministic stubs for model inference
  # - Real model integration planned via Anomalib
  # - Push-pull contrastive learning for Stage 2 (supervised) pending
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: retina-worker
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_CONCURRENCY=2
      - DEFAULT_UNSUPERVISED_MODEL=patchcore
      - DEBUG_MODE=false
      - MOCK_INFERENCE_DELAY_MS=0
      # GPT-4V: reads from .env file via ${OPENAI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GPT4V_PRODUCT_TYPE=${GPT4V_PRODUCT_TYPE:-manufactured product}
      - GPT4V_MAX_RETRIES=3
      # PatchCore: path inside container (matches volume mount below)
      - PATCHCORE_CHECKPOINT_PATH=/data/models/patchcore
    volumes:
      # Share image storage with backend so worker can read uploaded files
      - image-data:/data/images
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r = redis.from_url('redis://redis:6379'); r.ping()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Scale workers for parallel inference:
    # docker compose up --scale worker=4
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    networks:
      - retina-network

  # ---------------------------------------------------------------------------
  # Frontend - User Interface (Next.js)
  # ---------------------------------------------------------------------------
  # Responsibilities:
  # - System dashboard & monitoring
  # - Image submission interface
  # - Results visualization
  # - Active learning labeling interface
  #
  # Users:
  # - Engineers: System monitoring, batch submissions
  # - Domain Experts: Sample labeling, defect categorization
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: retina-frontend
    ports:
      - "3000:3000"
    environment:
      # Fixed: was pointing to wrong port 8000, backend is on 3001
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    networks:
      - retina-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  image-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  retina-network:
    driver: bridge
