dataset:
  abnormal_dir: anomaly
  eval_batch_size: 32
  format: folder
  image_size:
  - 256
  - 256
  name: decospan
  normal_dir: normal
  normalization: imagenet
  num_workers: 8
  path: C:/VakantieJob/Unsupervised_Models/dataset/decospan_small
  seed: 42
