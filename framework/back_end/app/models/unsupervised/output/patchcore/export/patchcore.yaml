  coreset_sampling_ratio: 0.1
  layers:
  - layer2
  - layer3
  name: patchcore
  num_neighbors: 15
optimization:
  export_mode: torch
trainer:
  default_root_dir: output/patchcore
  enable_checkpointing: true
