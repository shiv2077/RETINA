[theme]
base = "light"
primaryColor = "#2563EB"             # 6-digit hex
backgroundColor = "#FDFDFD"
secondaryBackgroundColor = "#F1F5F9"
textColor = "#171f2dff"
font = "sans serif"

# Put your extra colors in secrets so you can read them safely.
# (config.toml is merged into st.secrets at runtime)
[theme_extras]
secondaryTextColor = "#3F485F"
successColor = "#10B981"
warningColor = "#F59E0B"
errorColor = "#DC2626"
primaryLight = "#60A5FA"
primaryDark = "#1E40AF"
